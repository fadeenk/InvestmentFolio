name: CI

on:
    pull_request:
        branches: [ main, develop ]
    push:
        branches: [ develop ]

jobs:
    lint-and-typecheck:
        name: Lint & Typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
            - run: npm ci
            - run: npm --workspace=frontend ci
            - run: npm --workspace=worker ci
            - name: Lint
              run: npm run lint
            - name: Format check
              run: npm run format:check
            - name: Typecheck
              run: npm run typecheck

    test-frontend:
        name: Frontend Tests
        runs-on: ubuntu-latest
        needs: lint-and-typecheck
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
            - run: npm --workspace=frontend ci
            - name: Unit & Nuxt tests with coverage
              run: npm --workspace=frontend run test:coverage
            # - name: Upload coverage report
            #   uses: codecov/codecov-action@v4
            #   with:
            #       files: frontend/coverage/lcov.info
            #       flags: frontend

    test-worker:
        name: Worker Tests
        runs-on: ubuntu-latest
        needs: lint-and-typecheck
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
            - run: npm --workspace=worker ci
            - name: Worker tests with coverage
              run: npm --workspace=worker run test:coverage
            # - name: Upload coverage report
            #   uses: codecov/codecov-action@v4
            #   with:
            #       files: worker/coverage/lcov.info
            #       flags: worker
