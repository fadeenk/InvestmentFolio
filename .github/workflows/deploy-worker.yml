name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm --workspace=worker ci
      - name: Deploy with Wrangler
        run: npm --workspace=worker run deploy
